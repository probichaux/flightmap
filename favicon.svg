<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Beech Baron side profile silhouette -->
  <!-- Fuselage -->
  <path d="M2 16 Q2 13 5 12 L24 11 Q27 11 28 12 L30 14 Q31 15 30 16 L28 17 Q27 18 24 18 L5 19 Q2 19 2 16Z" fill="#1a1a1a"/>
  <!-- Low wing -->
  <path d="M10 15 L6 21 Q5.5 22 6.5 22 L20 22 Q21 22 20.5 21 L17 15Z" fill="#1a1a1a"/>
  <!-- Engine nacelle (front engine on wing) -->
  <ellipse cx="9" cy="20" rx="1.8" ry="1.2" fill="#1a1a1a"/>
  <!-- Engine nacelle (rear engine on wing) -->
  <ellipse cx="17" cy="20" rx="1.8" ry="1.2" fill="#1a1a1a"/>
  <!-- Horizontal stabilizer -->
  <path d="M3 15 L1 18 Q0.5 19 1.5 19 L6 19 L5 15Z" fill="#1a1a1a"/>
  <!-- Vertical stabilizer (tail) -->
  <path d="M3 12 L2 7 Q1.8 5.5 3 6 L6 9 L5 12Z" fill="#1a1a1a"/>
  <!-- Propeller hint at nose -->
  <line x1="30.5" y1="12" x2="30.5" y2="17" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Windshield -->
  <path d="M25 12 L26.5 12.5 L26.5 14.5 L25 15Z" fill="#4a90d9" opacity="0.7"/>
</svg>
